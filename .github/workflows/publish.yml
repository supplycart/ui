name: "Publish"

# on:
#   push:
#     branches:
#       - master

on:
    pull_request:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          registry-url: https://registry.npmjs.org/

      - run: npm ci

      - uses: JS-DevTools/npm-publish@v4
        with:
          token: ${{ secrets.NPM_AUTH_TOKEN_VUE3 }}
          access: public
